# ─── AimiliVPN Docker Compose 部署文件 ───
# 前置条件: 请在运行前先执行宿主机预检脚本
#   sudo bash docker-host-setup.sh
# 该脚本将自动: 加载 tun 模块 / 配置内核参数 / 检查 Docker 环境
#
# 启动:  docker compose up -d
# 停止:  docker compose down
# 日志:  docker logs -f aimilivpn
# 更新:  docker compose pull && docker compose up -d

services:
  aimilivpn:
    # 本地开发: 先执行 docker compose build 再 docker compose up -d
    # 生产部署: docker compose up -d 直接拉取 ghcr.io 上的预构建镜像
    build:
      context: .
      args:
        IMAGE_VERSION: dev
        BUILD_DATE: unknown
        GIT_COMMIT: unknown
    image: ghcr.io/xiaoxinkeji/aimili-vpngate:latest
    container_name: aimilivpn
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPNGATE_DATA_DIR=/opt/aimilivpn/vpngate_data
      - LOCAL_PROXY_HOST=127.0.0.1
      - LOCAL_PROXY_PORT=7928
      - UI_HOST=::
      - UI_PORT=8787
      - METRICS_ENABLED=true
      - METRICS_PORT=9798
      - METRICS_REFRESH_INTERVAL=15
      # ─── 上游代理 ───
      # - http_proxy=http://proxy_ip:port
      # - OPENVPN_UPSTREAM_SOCKS=socks5://proxy_ip:port
      # ─── 代理认证 ───
      # - LOCAL_PROXY_USER=myuser
      # - LOCAL_PROXY_PASS=mypass
      # ─── 性能调优 ───
      # - LOCAL_PROXY_MAX_CONNECTIONS=256
      # - FETCH_INTERVAL_SECONDS=1260
      # - MAX_SCAN_ROWS=300
    volumes:
      - ./vpngate_data:/opt/aimilivpn/vpngate_data
    tmpfs:
      - /tmp:exec
    # ─── 资源限制 (compose v2 兼容 + swarm deploy) ───
    cpus: "2"
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
      - net.ipv4.conf.default.rp_filter=2
      - net.ipv4.ip_forward=1
    # ─── 安全加固 ───
    security_opt:
      - no-new-privileges:true
    # ─── 日志轮转 ───
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    # ─── 健康检查 ───
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f vpngate_manager.py > /dev/null && curl -sf --max-time 5 \"http://localhost:$${UI_PORT:-8787}/\" > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ─── 自动更新 (Watchtower) ───
  watchtower:
    image: containrrr/watchtower:latest
    container_name: aimilivpn-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=21600
      - WATCHTOWER_NOTIFICATIONS=none
    command: --interval 21600 aimilivpn
    profiles:
      - auto-update
