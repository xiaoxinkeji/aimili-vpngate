services:
  aimilivpn:
    build: .
    container_name: aimilivpn
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPNGATE_DATA_DIR=/opt/aimilivpn/vpngate_data
      - LOCAL_PROXY_HOST=127.0.0.1
      - LOCAL_PROXY_PORT=7928
      - UI_HOST=::
      - UI_PORT=8787
      # ─── 上游代理 (用于拉取 VPNGate 节点列表) ───
      # - http_proxy=http://proxy_ip:port
      # - OPENVPN_UPSTREAM_SOCKS=socks5://proxy_ip:port
      # ─── 代理认证 (保护本地代理不被未授权使用) ───
      # - LOCAL_PROXY_USER=myuser
      # - LOCAL_PROXY_PASS=mypass
      # ─── 性能调优 ───
      # - LOCAL_PROXY_MAX_CONNECTIONS=256
      # - FETCH_INTERVAL_SECONDS=1260
      # - MAX_SCAN_ROWS=300
    volumes:
      - ./vpngate_data:/opt/aimilivpn/vpngate_data
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
      - net.ipv4.conf.default.rp_filter=2
      - net.ipv4.ip_forward=1
    # 如果 TUN 设备权限有问题，取消注释下面这行
    # privileged: true
    # 使用 healthcheck 替代 depends_on 等场景
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f vpngate_manager.py > /dev/null && curl -sf --max-time 5 http://localhost:8787/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
