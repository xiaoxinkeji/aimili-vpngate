name: Build X-MILI Integrated Binary

on:
  push:
    tags: ["v*"]
    paths:
      - 'xmili-integration/**'
      - 'x-mili/**'
      - '.github/workflows/xmili-binary-release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
            goarm: ""
          - arch: arm64
            goarch: arm64
            goarm: ""
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Apply aimili-vpngate integration patches
        run: |
          cp xmili-integration/vpngate_aimili.go x-mili/web/service/
          cd x-mili
          patch -p1 < ../xmili-integration/vpngate.patch

      - name: Build X-MILI binary (${{ matrix.arch }})
        run: |
          cd x-mili
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
          fi
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-w -s" -o ../x-mili-integrated main.go

      - name: Package binary
        run: |
          chmod +x x-mili-integrated
          tar czf x-mili-integrated-linux-${{ matrix.arch }}.tar.gz x-mili-integrated

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmili-binary-linux-${{ matrix.arch }}
          path: x-mili-integrated-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xmili-binary-*
          merge-multiple: true
          path: release

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
          name: ${{ github.ref_name }} (X-MILI Integrated)
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
